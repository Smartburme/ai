<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>Payments</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom right, #007BFF, #66CCFF);
      color: white;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .payment-card {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 320px;
    }

    .payment-card h2 {
      font-size: 20px;
      margin-bottom: 15px;
    }

    .amount {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .duration {
      font-size: 16px;
      margin-bottom: 25px;
    }

    .pay-options {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .pay-btn {
      padding: 12px 25px;
      background: white;
      color: #007BFF;
      font-weight: bold;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .pay-btn:hover {
      transform: scale(1.05);
    }

    .back-link {
      margin-top: 20px;
      color: white;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="payment-card">
    <h2>အသုံးပြုခစနစ်</h2>
    <div class="amount">5000 ကျပ်</div>
    <div class="duration">ရက် 30 သုံးစွဲနိုင်သည်</div>

    <div class="pay-options">
      <button class="pay-btn" onclick="location.href='kbzpay-qr.html'">KBZPay ဖြင့် ပေးချေမည်</button>
      <button class="pay-btn" onclick="location.href='wavepay-qr.html'">WavePay ဖြင့် ပေးချေမည်</button>
    </div>

    <div class="back-link" onclick="window.history.back()">← နောက်သို့</div>
  </div>

</body>
</html>
