<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Burme App</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore.js"></script>

  <!-- Firebase Config -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAr7Hv2ApKtNTxF11MhT5cuWeg_Dgsh0TY",
      authDomain: "smart-burme-app.firebaseapp.com",
      projectId: "smart-burme-app",
      storageBucket: "smart-burme-app.appspot.com",
      messagingSenderId: "851502425686",
      appId: "1:851502425686:web:f29e0e1dfa84794b4abdf7"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>

  <!-- Custom Styles -->
  <style>
    body {
      background-color: #1e90ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
    }

    .loader {
      border: 16px solid #f3f3f3;
      border-top: 16px solid #3498db;
      border-radius: 50%;
      width: 100px;
      height: 100px;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .container {
      display: none;
    }

    .payment-message {
      font-size: 1.2em;
    }

    .btn-login {
      padding: 10px 20px;
      background-color: #3498db;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }
    
    .btn-login:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div class="container">
    <p class="payment-message">5000 ကျပ်သွင်း၍ ရက် 30 အသုံးပြုနိုင်သည်</p>
    <button class="btn-login" onclick="handlePayment()">Login & Pay</button>
  </div>

  <!-- Firebase Authentication Logic & Payment Handling -->
  <script>
    // Display the loader first, then show content after a delay
    setTimeout(function() {
      document.querySelector('.loader').style.display = 'none';
      document.querySelector('.container').style.display = 'block';
    }, 3000);

    // Handle Payment and Redirect to Payment Success page
    function handlePayment() {
      const user = firebase.auth().currentUser;

      if (user) {
        const paymentSuccess = true;  // Simulate successful payment

        if (paymentSuccess) {
          // Redirect to payment success page
          window.location.href = "paymentSuccess.html";
        } else {
          alert("Payment failed. Please try again.");
        }
      } else {
        alert("Please login first to complete payment.");
      }
    }
  </script>
</body>
</html>
