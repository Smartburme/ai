<!DOCTYPE html>
<html>
<head>
  <title>Smart Burme - Payment</title>
  <style>
    body {
      background: linear-gradient(to right, #2193b0, #6dd5ed);

      padding-top: 100px;

    .login-btn {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #ffffff;
      color: #2193b0;
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.2s;
      cursor: pointer;
    }
    .login-btn:hover {
      transform: scale(1.05);
    }

</head>
<body>
  <h1>5000 ကျပ်သွင်း၍ ရက် 30 အသုံးပြုနိုင်သည်</h1>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyAr7Hv2ApKtNTxF11MhT5cuWeg_Dgsh0TY",
      authDomain: "smart-burme-app.firebaseapp.com",
      projectId: "smart-burme-app",
      storageBucket: "smart-burme-app.appspot.com",
      messagingSenderId: "851502425686",
      appId: "1:851502425686:web:f29e0e1dfa84794b4abdf7"

    }
  </script>
</body>
