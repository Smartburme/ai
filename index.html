<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Burme Loader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3;url=main.html">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .loader-container {
      width: 100%;
      height: 100vh;
      background: url('background/index.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .title {
      font-size: 2.5rem;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00cccc;
      margin-bottom: 20px;
    }

    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 30px;
    }

    .glow-text {
      font-size: 1.5rem;
      color: #fff;
      text-shadow: 0 0 10px #ff5500, 0 0 20px #ff5500;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.8;
      }
      50% {
        transform: scale(1.1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <div class="loader-container">
    <div class="title">Smart Burme</div>
    <img src="Animation - 1746554391918.gif" alt="Smart Burme Logo" class="logo">
  </div>

</body>
</html>
