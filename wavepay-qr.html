<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>WavePay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: linear-gradient(to right, #003366, #00ccff);
      color: white;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .qr-card {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 20px;
    }

    .qr-card img {
      width: 250px;
      height: 250px;
      margin: 20px 0;
      border-radius: 10px;
      border: 2px solid white;
    }

    .back-link {
      margin-top: 20px;
      color: white;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="qr-card">
    <h2>WavePay ဖြင့် ပေးချေပါ</h2>
    <img src="wavepay-qr.png" alt="WavePay QR Code">
    <p>QR Code ကို WavePay App ဖြင့် scan ပြီး ပေးချေပါ။</p>
    <div class="back-link" onclick="window.history.back()">← နောက်သို့</div>
  </div>

</body>
</html>
