<!DOCTYPE html>
<html>
<head>
  <title>Smart Burme - Payments</title>
  <style>
    body {
      background: #000;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 30px;
    }
    h1 {
      color: #00c6ff;
    }
    .payment-options, .auth-form {
      margin-top: 50px;
    }
    .pay-btn {
      background-color: #00c6ff;
      color: white;
      border: none;
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 10px;
      margin: 10px;
      cursor: pointer;
    }
    .pay-btn:hover {
      transform: scale(1.05);
    }
    .auth-form {
      display: none;
      flex-direction: column;
      align-items: center;
    }
    .auth-form input {
      padding: 10px;
      margin: 10px;
      width: 200px;
      border-radius: 5px;
      border: none;
    }
    .auth-form button {
      background-color: #00ff99;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }
    .auth-form button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>ငွေချေမှုနည်းလမ်း ရွေးချယ်ပါ</h1>

  <div class="payment-options">
    <button class="pay-btn" onclick="simulatePayment('KBZPay')">KBZPay</button>
    <button class="pay-btn" onclick="simulatePayment('WavePay')">WavePay</button>
  </div>

  <div class="auth-form" id="authForm">
    <h2>Login Info</h2>
    <input type="email" id="email" placeholder="Enter Email" required />
    <input type="password" id="password" placeholder="Enter Password" required />
    <button onclick="register()">Submit</button>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAr7Hv2ApKtNTxF11MhT5cuWeg_Dgsh0TY",
      authDomain: "smart-burme-app.firebaseapp.com",
      projectId: "smart-burme-app",
      storageBucket: "smart-burme-app.appspot.com",
      messagingSenderId: "851502425686",
      appId: "1:851502425686:web:f29e0e1dfa84794b4abdf7"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function simulatePayment(method) {
      alert(method + " ဖြင့် ငွေချေနေသည်...");

      // Simulate successful payment after 2 seconds
      setTimeout(() => {
        alert("ငွေချေမှု အောင်မြင်ပါသည်!");
        document.querySelector('.payment-options').style.display = 'none';
        document.getElementById('authForm').style.display = 'flex';
      }, 2000);
    }

    function register() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          alert("Account Created Successfully!");
          window.location.href = "main.html";
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
    }
  </script>
</body>
</html>
