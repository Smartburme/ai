<!DOCTYPE html>
<html>
<head>
  <title>Payment - Smart Burme</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      padding-top: 80px;
      font-family: sans-serif;
    }
    input, button {
      padding: 10px;
      margin: 8px;
      font-size: 16px;
      border-radius: 6px;
    }
    .pay-btn {
      background: #4CAF50;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Pay 5000Ks for 30-Day Access</h1>

  <input type="email" id="email" placeholder="Enter Email"><br>
  <input type="password" id="password" placeholder="Create Password"><br>
  <button class="pay-btn" onclick="processPayment()">Pay Now</button>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAr7Hv2ApKtNTxF11MhT5cuWeg_Dgsh0TY",
      authDomain: "smart-burme-app.firebaseapp.com",
      projectId: "smart-burme-app",
      storageBucket: "smart-burme-app.appspot.com",
      messagingSenderId: "851502425686",
      appId: "1:851502425686:web:f29e0e1dfa84794b4abdf7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // EmailJS Init
    emailjs.init("MLJqwYo1ZN4j15iYx");

    function sendLoginMail(email, password) {
      emailjs.send("smartburme25", "mail25", {
        to_email: email,
        message: `Smart Burme Payment Successful!\nYour login info:\nEmail: ${email}\nPassword: ${password}`
      }).then(
        res => {
          console.log("Mail sent:", res);
          alert("Payment success. Check your email for login info.");
          window.location.href = "app/main.html";
        },
        err => {
          console.error("Mail error:", err);
          alert("Payment done. But email sending failed.");
        }
      );
    }

    function processPayment() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Simulate successful payment
      const paymentSuccess = true;

      if (paymentSuccess) {
        auth.createUserWithEmailAndPassword(email, password)
          .then(() => {
            sendLoginMail(email, password);
          })
          .catch(err => {
            alert("Register Error: " + err.message);
          });
      } else {
        alert("Payment failed. Try again.");
      }
    }
  </script>

</body>
</html>
