<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Burme</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: black;
      font-family: sans-serif;
      color: white;
      overflow-x: hidden;
    }

    .top-bar {
      background: rgba(0, 0, 0, 0.8);
      padding: 1rem;
      text-align: center;
      font-size: 1.8rem;
      font-weight: bold;
      color: cyan;
      text-shadow: 0 0 10px cyan;
    }

    .menu-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: transparent;
      border: 2px solid cyan;
      color: cyan;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 5px;
    }

    .slide-menu {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.95);
      box-shadow: 2px 0 15px rgba(0,255,255,0.2);
      transition: 0.3s;
      padding: 20px;
      z-index: 999;
    }

    .slide-menu.active {
      left: 0;
    }

    .slide-menu a {
      display: block;
      color: white;
      padding: 12px 0;
      text-decoration: none;
      font-size: 1.2rem;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      z-index: 998;
    }

    .overlay.active {
      display: block;
    }

    .generate-btn {
      display: block;
      margin: 100px auto;
      background: linear-gradient(to right, #00f0ff, #0088ff);
      border: none;
      padding: 15px 30px;
      font-size: 1.2rem;
      border-radius: 10px;
      color: black;
      cursor: pointer;
      box-shadow: 0 0 15px cyan;
      text-decoration: none;
      text-align: center;
      width: max-content;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      background: linear-gradient(to top, #111, transparent);
      color: white;
      font-size: 0.9rem;
      padding: 10px;
      text-shadow: 0 0 5px #0ff;
    }

  </style>
</head>
<body>

  <div class="top-bar">
    Smart Burme
  </div>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div class="slide-menu" id="slideMenu">
    <a href="#">Settings</a>
    <a href="#">Contact</a>
    <a href="#">About</a>
  </div>

  <div class="overlay" id="menuOverlay" onclick="closeMenu()"></div>

  <a href="app/generate.html" class="generate-btn">🔥 Generate Video</a>

  <footer>
    Deploy by Aung Myo Kyaw
  </footer>

  <script>
    const menu = document.getElementById('slideMenu');
    const overlay = document.getElementById('menuOverlay');

    function toggleMenu() {
      menu.classList.toggle('active');
      overlay.classList.toggle('active');
    }

    function closeMenu() {
      menu.classList.remove('active');
      overlay.classList.remove('active');
    }
  </script>

</body>
</html>
